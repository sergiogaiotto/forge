name: CI

# Integração contínua: typecheck, testes, build e empacotamento em cada push/PR.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Typecheck (extensão + webview)
        run: npm run typecheck

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build

      - name: Empacotar .vsix
        run: npm run package

      - name: Publicar artefato .vsix
        uses: actions/upload-artifact@v4
        with:
          name: forge-vsix
          path: "*.vsix"
          if-no-files-found: error
