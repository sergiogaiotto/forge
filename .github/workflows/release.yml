name: Release

# Publica no VS Marketplace e no Open VSX ao criar uma tag "v*" (ex.: v1.0.0).
# Secrets necessários (Settings → Secrets and variables → Actions):
#   VSCE_PAT  — Personal Access Token do Azure DevOps (VS Marketplace)
#   OVSX_PAT  — token do Open VSX
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Empacotar .vsix
        run: npm run package

      - name: Publicar no VS Marketplace
        run: npx @vscode/vsce publish -p "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publicar no Open VSX
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Anexar .vsix à release do GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
