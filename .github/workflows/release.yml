name: Release

# Ao criar uma tag "v*" (ex.: v1.0.1): roda CI, empacota o .vsix e cria a Release
# do GitHub com o pacote anexado. A publicação no VS Marketplace / Open VSX só
# ocorre se os secrets existirem — sem eles, esses passos são PULADOS (não falham)
# e o .vsix fica disponível para download na Release.
# Secrets (opcionais): VSCE_PAT (VS Marketplace), OVSX_PAT (Open VSX).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Empacotar .vsix
        run: npm run package

      - name: Publicar no VS Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish -p "$VSCE_PAT"

      - name: Publicar no Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        run: npx ovsx publish *.vsix -p "$OVSX_PAT"

      - name: Criar Release e anexar o .vsix
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
