# CI/CD do FORGE (GitLab — repositório interno).
# Variáveis necessárias (Settings → CI/CD → Variables, marque "Masked"):
#   VSCE_PAT  — Personal Access Token do Azure DevOps (publicar no VS Marketplace)
#   OVSX_PAT  — token do Open VSX (publicar no Open VSX)
# Observação: src/license/embeddedKey.ts (apenas a chave PÚBLICA) é versionado;
# a chave privada nunca entra no repositório.

stages:
  - verify
  - review
  - build
  - publish

default:
  image: node:22
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline

verify:
  stage: verify
  script:
    - npm run typecheck
    - npm test

# FORGE Review (in-network) — revisa o MR pelo HubGPU/gateway interno e publica
# uma nota de revisão. Rode num runner in-network (tag) que alcance o LLM_BASE_URL.
# Variáveis: LLM_BASE_URL, LLM_MODEL, LLM_AUTH_HEADER (opcional), GITLAB_TOKEN.
forge:review:
  stage: review
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $LLM_BASE_URL'
  # tags: [in-network]   # descomente e ajuste para o seu runner interno
  before_script: []
  script:
    - node ci/forge-review.mjs

build:
  stage: build
  script:
    - npm run build
    - npx @vscode/vsce package --allow-missing-repository --skip-license
      --baseContentUrl "$CI_PROJECT_URL" --baseImagesUrl "$CI_PROJECT_URL"
      -o "forge-${CI_COMMIT_SHORT_SHA}.vsix"
  artifacts:
    name: "forge-${CI_COMMIT_SHORT_SHA}"
    paths:
      - "*.vsix"
    expire_in: 30 days

publish:marketplace:
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
      when: manual
  script:
    - npm run build
    - npx @vscode/vsce publish -p "$VSCE_PAT"

publish:openvsx:
  stage: publish
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]/'
      when: manual
  script:
    - npm run build
    - npx @vscode/vsce package --allow-missing-repository --skip-license
      --baseContentUrl "$CI_PROJECT_URL" --baseImagesUrl "$CI_PROJECT_URL" -o forge.vsix
    - npx ovsx publish forge.vsix -p "$OVSX_PAT"
